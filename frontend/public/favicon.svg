<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Background gradient purple-indigo-cyan matching your circular avatar backplate -->
    <linearGradient id="bgGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9333ea" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>

  <!-- Circular Badge Background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" />

  <!-- Cursive Handwriting "AP" Monogram -->
  <path 
    d="M 20.5 65 L 31.5 65 M 26 65 L 45.5 23 L 61.5 65 M 35.5 47 C 40.5 44 47 44 51.5 47 M 61.5 41 L 61.5 83 M 53.5 83 L 69.5 83 M 61.5 41 C 79.5 41 81.5 65 61.5 65" 
    stroke="#ffffff" 
    stroke-width="6" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
</svg>