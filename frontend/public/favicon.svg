<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Premium purple-to-cyan gradient backdrop -->
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bd00ff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
    
    <!-- Neon drop-glow effect filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Rounded Capsule Shield -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#logoBg)" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15" />

  <!-- Integrated "AN" Monogram Glyph -->
  <g filter="url(#neonGlow)">
    <!-- Shared center vertical, A left leg, and N right leg -->
    <path 
      d="M 28 72 L 48 30 M 34 58 H 48 M 48 30 V 72 L 72 72 V 30" 
      stroke="#ffffff" 
      stroke-width="7" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
  </g>
</svg>