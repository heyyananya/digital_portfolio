    d="M 27 75 L 37 75 M 32 75 L 52 25 L 52 75 M 47 75 L 57 75 M 42 50 L 52 50 M 52 25 C 70 25 70 50 52 50" 
    stroke="#ffffff" 
    stroke-width="6.5" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
</svg>